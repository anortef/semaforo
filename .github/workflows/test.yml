name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build domain package
        run: npm run build -w packages/domain

      - name: Domain tests
        run: npm test -w packages/domain

      - name: API unit tests
        run: npm run test:unit -w apps/api

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build domain package
        run: npm run build -w packages/domain

      - name: Type check API
        run: npx tsc --noEmit -p apps/api/tsconfig.json
        continue-on-error: true

      - name: Type check Web
        run: npx tsc --noEmit -p apps/web/tsconfig.json
